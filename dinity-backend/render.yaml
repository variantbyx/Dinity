services:
  - type: web
    name: dinity-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Set these in the Render dashboard — never hardcode secrets here:
      # - key: MONGODB_URI
      # - key: JWT_SECRET
      # - key: JWT_EXPIRE
      # - key: CLIENT_URL
      # - key: CLOUDINARY_CLOUD_NAME
      # - key: CLOUDINARY_API_KEY
      # - key: CLOUDINARY_API_SECRET
